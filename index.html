<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccesQCH | Digital Love Gifts</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --primary: #ff4d4d;
            --dark: #0f0f0f;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.7;
            font-size: 14px;
        }

        .menu-container {
            width: 100%;
            max-width: 400px;
            display: grid;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 77, 77, 0.2);
        }

        .card-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card-icon {
            font-size: 24px;
            color: var(--primary);
            width: 40px;
            text-align: center;
        }

        .card-text h3 {
            margin: 0;
            font-size: 16px;
        }

        .card-text p {
            margin: 5px 0 0;
            font-size: 12px;
            opacity: 0.6;
        }

        .go-icon {
            font-size: 14px;
            opacity: 0.5;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ACCESQCH</h1>
        <p>Sevgini koda çeviririk 💻🌹</p>
    </div>

    <div class="menu-container">
        
        <!-- Xidmət 1 -->

            <div class="card-info">
                <div class="card-icon"><i class="fas fa-gamepad"></i></div>
                <div class="card-text">
                    <h3>Love Quest Oyunu</h3>
                    <p>Maneələri keç, sürprizi aç!</p>
                </div>
            </div>
            <div class="go-icon"><i class="fas fa-chevron-right"></i></div>
        </a>

        <!-- Xidmət 2 -->

            <div class="card-info">
                <div class="card-icon"><i class="fas fa-history"></i></div>
                <div class="card-text">
                    <h3>Zaman Tuneli</h3>
                    <p>Xatirələriniz animasiya ilə canlansın.</p>
                </div>
            </div>
            <div class="go-icon"><i class="fas fa-chevron-right"></i></div>
        </a>

        <!-- Xidmət 3 -->
        <a href="https://wa.me/994998461606?text=Salam!%20'Secret%20Quiz'%20testi%20düzəltmək%20istəyirəm." class="card">
            <div class="card-info">
                <div class="card-icon"><i class="fas fa-question-circle"></i></div>
                <div class="card-text">
                    <h3>Secret Quiz</h3>
                    <p>Məni nə qədər tanıyırsan? testi.</p>
                </div>
            </div>
            <div class="go-icon"><i class="fas fa-chevron-right"></i></div>
        </a>

        <!-- Xidmət 4 -->
        <a href="https://wa.me/994998461606?text=Salam!%20'Spotify%20Vinil'%20modeli%20istəyirəm." class="card">
            <div class="card-info">
                <div class="card-icon"><i class="fas fa-compact-disc"></i></div>
                <div class="card-text">
                    <h3>Spotify Vinil Saytı</h3>
                    <p>Sizin mahnınız, sizin fotonuz.</p>
                </div>
            </div>
            <div class="go-icon"><i class="fas fa-chevron-right"></i></div>
        </a>

    </div>

    <div class="footer">
        © 2026 AccesQCH | Bütün hüquqlar qorunur
    </div>

</body>
</html>
