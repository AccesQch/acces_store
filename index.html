<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Təşəkkürlər Telman! 🇺🇸</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Montserrat', sans-serif; background: #000;
        }

        /* Amerika Arxa Fonu */
        .usa-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.8)), 
                        url('https://images.unsplash.com/photo-1496871455396-14e56815f1f4?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-position: center;
            z-index: -1; animation: subtleZoom 30s infinite alternate;
        }

        @keyframes subtleZoom { from { transform: scale(1); } to { transform: scale(1.1); } }

        .container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center; color: white; padding: 20px;
        }

        .thank-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            padding: 50px; border-radius: 40px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,215,0,0.1);
            max-width: 550px; animation: popIn 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            position: relative; z-index: 10;
        }

        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        h1 { font-family: 'Great Vibes', cursive; font-size: 5rem; margin: 10px 0; color: #ffd700; text-shadow: 3px 3px 15px rgba(0,0,0,0.5); }
        h2 { font-weight: 900; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; font-size: 1.2rem; color: #fff; opacity: 0.9; }
        
        .message { font-size: 1.2rem; line-height: 1.6; color: #f0f0f0; margin-bottom: 30px; font-weight: 300; }
        .usa-flag { font-size: 50px; margin-bottom: 10px; display: block; filter: drop-shadow(0 0 10px white); }

        /* DOLLAR YAĞIŞI STİLLƏRİ */
        .dollar {
            position: absolute;
            top: -100px;
            pointer-events: none;
            z-index: 999;
            user-select: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* Düymə */
        .play-btn {
            background: linear-gradient(45deg, #B22234, #3C3B6E);
            color: white; border: none;
            padding: 18px 50px; border-radius: 50px; font-weight: bold;
            cursor: pointer; transition: 0.4s; font-size: 1.1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: inline-flex; align-items: center; gap: 15px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .play-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(255,215,0,0.3); letter-spacing: 2px; }

        .footer { position: absolute; bottom: 20px; font-size: 10px; opacity: 0.5; letter-spacing: 3px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="usa-bg"></div>

    <div class="container">
        <div class="thank-card">
            <span class="usa-flag">🇺🇸</span>
            <h2>Əziz Xalam Oğlu</h2>
            <h1>Telman</h1>
            <p class="message">
                Amerikadan göndərdiyin bu gözəl jest və dəstək üçün sənə ürəkdən təşəkkür edirəm. <br> 
                Sənin kimi qardaşın olması mənim üçün böyük fəxrdir! 💸
            </p>
            
            <button class="play-btn" onclick="startEverything()">
                <i class="fas fa-dollar-sign" id="btn-icon"></i> Sürprizi Başlat
            </button>
        </div>

        <div class="footer">EXCLUSIVE FOR TELMAN • FROM AZERBAIJAN TO USA</div>
    </div>

    <div id="player"></div>

    <script>
        // YouTube API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'NToDDXtv5_I', 
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) {}

        function startEverything() {
            // Mahnını oxut
            player.playVideo();
            
            // Düymənin görünüşünü dəyiş
            document.getElementById('btn-icon').className = "fas fa-money-bill-wave";
            
            // 150 dənə dollar yağdır
            for(let i = 0; i < 150; i++) {
                setTimeout(createDollar, i * 150);
            }
        }

        function createDollar() {
            const dollar = document.createElement('div');
            dollar.classList.add('dollar');
            
            // Təsadüfi olaraq ya yaşıl dollar simvolu ya da kağız dollar şəkli yaradılır
            const isImage = Math.random() > 0.5;
            if(isImage) {
                dollar.innerHTML = `<img src="https://www.freeiconspng.com/uploads/100-dollar-bill-png-0.png" width="${Math.random() * 80 + 40}px">`;
            } else {
                dollar.innerHTML = '<i class="fas fa-dollar-sign"></i>';
                dollar.style.color = "#2ecc71";
                dollar.style.fontSize = Math.random() * 30 + 20 + 'px';
            }

            dollar.style.left = Math.random() * 100 + 'vw';
            dollar.style.animationDuration = Math.random() * 3 + 2 + 's'; // 2-5 saniyə arası düşmə sürəti
            dollar.style.zIndex = "1000";
            
            document.body.appendChild(dollar);
            
            // 5 saniyə sonra elementləri sil ki, sayt ağırlaşmasın
            setTimeout(() => { dollar.remove(); }, 5000);
        }
    </script>
</body>
</html>
